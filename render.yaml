services:
  # Java 17 / Spring Boot REST API (auth, cases, documents, events)
  - type: web
    name: advohq-backend
    env: docker
    rootDir: advohq-backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false # Supabase SESSION POOLER (IPv4), e.g. jdbc:postgresql://<pooler-host>:5432/postgres?sslmode=require
      - key: DB_USERNAME
        sync: false # postgres.<project-ref> — note the .<project-ref> suffix required by the pooler
      - key: DB_PASSWORD
        sync: false # Supabase database password
      - key: DB_SCHEMA
        value: advohq # dedicated schema so this app never touches Supabase's "public" tables
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "43200000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false # set to the deployed advohq-frontend URL
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  # Static site + small Express server (serves the HTML/CSS/JS and the
  # /api/chat, /api/send-otp, /api/verify-otp routes)
  - type: web
    name: advohq-frontend
    env: node
    rootDir: advohq-frontend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: AI_MAX_PER_HOUR
        value: "20"
      - key: AI_MAX_PER_MIN
        value: "6"
      - key: OTP_SECRET
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false # must be a verified sender in Brevo
      - key: BREVO_SENDER_NAME
        value: "AdvoHQ"
