spring:
  application:
    name: advohq-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/advohq}
    username: ${DB_USERNAME:advohq}
    password: ${DB_PASSWORD:advohq}
    hikari:
      maximum-pool-size: 10
      pool-name: advohq-pool
      # Dedicated schema so this app never touches tables from any other
      # project sharing the same Postgres database (e.g. Supabase's public
      # schema). "public" stays on the search path as a fallback for core
      # functions; nothing app-level should ever resolve there.
      schema: ${DB_SCHEMA:advohq},public

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates it
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        default_schema: ${DB_SCHEMA:advohq}
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: ${DB_SCHEMA:advohq}
    create-schemas: true

  servlet:
    multipart:
      max-file-size: 50MB         # client-provided docs (briefs, exhibits) can be large
      max-request-size: 60MB

server:
  # Render injects PORT at runtime; SERVER_PORT still works for local/other hosts.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

# ── Application-specific configuration ───────────────────────────────
advohq:
  security:
    jwt:
      # Base64-encoded 256-bit secret. OVERRIDE in production via JWT_SECRET.
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
      # Access token lifetime in milliseconds (default 12h).
      expiration-ms: ${JWT_EXPIRATION_MS:43200000}
    cors:
      # Comma-separated list of allowed front-end origins.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:8000,http://localhost:5500}

  aws:
    region: ${AWS_REGION:ap-south-1}
    s3:
      bucket: ${AWS_S3_BUCKET:advohq-documents}
      # Optional custom endpoint (e.g. for LocalStack/MinIO in dev). Leave blank for real AWS.
      endpoint: ${AWS_S3_ENDPOINT:}
      # How long generated download/upload URLs remain valid (minutes).
      presign-expiry-minutes: ${AWS_S3_PRESIGN_MINUTES:15}

logging:
  level:
    in.advohq: INFO
    org.flywaydb: INFO
