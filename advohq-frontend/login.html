<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdvoHQ — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --ink: #1b2632;
      --ink-2: #2c3b4d;
      --ink-3: #3b4e63;
      --ink-4: #5a6878;
      --line: #d8d0c0;
      --line-soft: #e7e1d5;
      --surface: #ffffff;
      --surface-2: #eee9df;
      --surface-3: #e7e1d5;
      --danger: #b91c1c;
      --r-sm: 12px;
      --r-md: 20px;
      --r-lg: 28px;
      --r-xl: 40px;
      --shadow-lg: 0 16px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--surface-2);
      background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
    }
    .logo-advo { color: #1e2d4a; }
    .logo-hq   { color: #1e2d4a; }

    .login-sub {
      font-size: 0.82rem;
      color: var(--ink-4);
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: var(--ink); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.6rem; }
    .pw-eye {
      position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; padding: 2px;
      cursor: pointer; color: var(--ink-4); font-size: 0.85rem;
    }
    .pw-eye:hover { color: var(--ink); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.2rem;
      border-radius: var(--r-xl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: #000; color: #fff; }
    .btn-primary:hover { background: #1a1a1a; }

    .login-btn-full {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      justify-content: center;
      font-size: 0.9rem;
    }

    .login-hint {
      font-size: 0.72rem;
      color: var(--ink-4);
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid var(--line-soft);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
    }
    .hint-link {
      color: var(--ink-4);
      text-decoration: none;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .hint-link:hover { color: var(--ink); }

    /* small screens: fit the card in one viewport, no page scroll */
    @media (max-width: 600px) {
      html, body { height: 100%; overflow: hidden; }
      .login-wrap { height: 100dvh; min-height: 100dvh; overflow: hidden; padding: 1rem; }
      .login-card { padding: 1.75rem 1.5rem; border-radius: var(--r-md); }
      .login-logo img { height: 40px !important; }
      .login-sub { margin-bottom: 1.25rem; padding-bottom: 1rem; }
      .field { margin-bottom: 0.9rem; }
      .login-hint { margin-top: 1rem; padding-top: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo"><img src="tech-logo.png" alt="AdvoHQ" style="height:48px;width:auto;vertical-align:middle;filter:brightness(0);"/></div>
    <div class="login-sub">Member login · Case &amp; Brief Management</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="l-pass" placeholder="" autocomplete="current-password">
        <button class="pw-eye" type="button" onclick="togglePw('l-pass', this)" title="Show password" aria-label="Show password"><i class="fas fa-eye"></i></button>
      </div>
    </div>

    <div id="login-err" style="color:#c0392b;font-size:0.82rem;min-height:1rem;margin-bottom:0.4rem;"></div>

    <button class="btn btn-primary login-btn-full" id="login-btn">
      Login
    </button>

    <div class="login-hint">
      <a href="index.html" class="hint-link">← Home</a>
      <a href="signup.html" class="hint-link">Create an account →</a>
    </div>

  </div>
</div>

<script>
  const ADVOHQ_API_BASE = 'https://advohq-backend.onrender.com';

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (!input) return;
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.innerHTML = show ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    btn.title = show ? 'Hide password' : 'Show password';
    btn.setAttribute('aria-label', btn.title);
  }

  async function doLogin() {
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value.trim();
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('login-btn');
    errEl.textContent = '';
    if (!u || !p) {
      errEl.textContent = 'Enter your username and password.';
      return;
    }
    btn.disabled = true;
    try {
      const res = await fetch(`${ADVOHQ_API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ username: u, password: p }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        errEl.textContent = data.message || 'Invalid credentials. Please try again.';
        return;
      }
      // Persist the signed-in user's profile so the rest of the product
      // (e.g. the Settings page) shows their real credentials. The password
      // is never stored server-side in readable form; a device-only copy goes
      // into localStorage (same scope as the auth token, so it works across
      // tabs) and is cleared on logout or session expiry.
      localStorage.setItem('advohq_token', data.token);
      localStorage.setItem('advohq_user', JSON.stringify({
        displayName: data.user.displayName || data.user.fullName,
        username: data.user.username,
        email: data.user.email || '',
        password: ''
      }));
      localStorage.setItem('advohq_pw', p);
      window.location.href = 'home.html';
    } catch (e) {
      errEl.textContent = 'Could not reach the server. Please try again.';
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('l-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>

</body>
</html>
