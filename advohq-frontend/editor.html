  /* ── URL param ── */
  const params = new URLSearchParams(location.search);
  const fname = params.get('file');
  if (fname) document.getElementById('topbarFilename').value = decodeURIComponent(fname);

  /* ═══════════════════════════════════════════
     MULTI-PAGE DRAWING SYSTEM
     Each page has its own { canvas, ctx, strokes }
     stored in pageStates[].
     The single blank page on load uses index 0.
  ═══════════════════════════════════════════ */
  let pageStates = [];   // { canvas, ctx, strokes }
  let toastTimer;

  /* ── State (shared across all pages) ── */
  let activeTool = null;   // no tool selected until the user picks one
  let penColor   = '#1b2632';
  let hlColor    = 'rgba(255,235,59,0.28)';
  let penSize    = 4;   // pen thickness (also used by eraser & text)
  let hlSize     = 4;   // highlighter thickness
  let docxEditable = null;    // contenteditable element when a Word doc is open
  let currentFileName = null; // name of the file currently displayed

  /* ── Init blank page ── */
  function initBlankPage() {
    const canvas = document.getElementById('annotationCanvas');
    const docPage = document.getElementById('docPage');
    const hint = document.getElementById('docHint');
    const ctx = canvas.getContext('2d');
    docxEditable = null;
    pageStates = [{ canvas, ctx, strokes: [], hint, inner: docPage }];
    resizePageCanvas(0, docPage);
    attachCanvasEvents(canvas, 0);
    attachTextLayer(docPage, 0);
    window.addEventListener('resize', () => resizePageCanvas(0, docPage));
  }

  function resizePageCanvas(idx, container) {
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx } = state;
    const dpr = window.devicePixelRatio || 1;
    const img = canvas.toDataURL();
    canvas.width  = container.offsetWidth  * dpr;
    canvas.height = container.offsetHeight * dpr;
    canvas.style.width  = container.offsetWidth  + 'px';
    canvas.style.height = container.offsetHeight + 'px';
    ctx.scale(dpr, dpr);
    const image = new Image();
    image.onload = () => ctx.drawImage(image, 0, 0);
    image.src = img;
  }

  function attachCanvasEvents(canvas, idx) {
    canvas.addEventListener('mousedown',  e => startDraw(e, idx));
    canvas.addEventListener('mousemove',  e => draw(e, idx));
    canvas.addEventListener('mouseup',    e => endDraw(e, idx));
    canvas.addEventListener('mouseleave', e => endDraw(e, idx));
    canvas.addEventListener('touchstart', e => startDraw(e, idx), { passive: false });
    canvas.addEventListener('touchmove',  e => draw(e, idx),      { passive: false });
    canvas.addEventListener('touchend',   e => endDraw(e, idx));
  }

  /* ═══════════════════════════════════════════
     TEXT TOOL — click a page to drop an editable,
     draggable text box (works on PDF, image & blank pages)
  ═══════════════════════════════════════════ */
  function attachTextLayer(inner, idx) {
    if (!inner || inner._textLayer) return;
    inner._textLayer = true;
    inner.addEventListener('mousedown', e => {
      if (activeTool !== 'text') return;
      // Don't drop a new box when clicking an existing one (to edit/move it).
      if (e.target.closest('.text-annotation')) return;
      const rect = inner.getBoundingClientRect();
      createTextBox(inner, e.clientX - rect.left, e.clientY - rect.top);
    });
  }

  function createTextBox(inner, x, y, initial) {
    const box = document.createElement('div');
    box.className = 'text-annotation';
    box.style.left = x + 'px';
    box.style.top  = y + 'px';
    box.style.color = penColor;
    box.style.fontSize = (13 + penSize * 2) + 'px';

    const handle = document.createElement('div');
    handle.className = 'ta-handle';
    handle.title = 'Drag to move';
    handle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>`;

    const del = document.createElement('div');
    del.className = 'ta-del';
    del.title = 'Delete';
    del.textContent = '×';
    del.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); box.remove(); });

    const content = document.createElement('div');
    content.className = 'ta-text';
    content.contentEditable = 'true';
    content.textContent = initial || '';
    content.addEventListener('blur', () => { if (!content.textContent.trim()) box.remove(); });

    box.appendChild(handle);
    box.appendChild(del);
    box.appendChild(content);
    inner.appendChild(box);
    setTimeout(() => content.focus(), 0);
    makeBoxDraggable(box, handle, inner);
  }

  function makeBoxDraggable(box, handle, inner) {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const rect = inner.getBoundingClientRect();
      const offX = e.clientX - rect.left - box.offsetLeft;
      const offY = e.clientY - rect.top  - box.offsetTop;
      function move(ev) {
        box.style.left = Math.max(0, ev.clientX - rect.left - offX) + 'px';
        box.style.top  = Math.max(0, ev.clientY - rect.top  - offY) + 'px';
      }
      function up() {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
      }
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  }

  /* ── Drawing ── */
  let isDrawing = false;
  let currentPath = [];
  let activeIdx = 0;
  // Highlight-specific state
  let hlStartX = 0, hlStartY = 0;
  let baseSnapshot = null; // canvas snapshot taken before the current highlight stroke
  // Two-finger scroll on touch devices: one finger draws, two fingers pan the page.
  let twoFingerLastY = null;

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function startDraw(e, idx) {
    // Two fingers = scroll the document, don't draw (standard on drawing apps).
    if (e.touches && e.touches.length > 1) {
      isDrawing = false;
      twoFingerLastY = e.touches[0].clientY;
      return;
    }
    // No drawing tool selected → don't draw (the page stays readable/scrollable).
    if (!activeTool || activeTool === 'text') return;
    e.preventDefault();
    isDrawing = true;
    activeIdx = idx;
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx, hint } = state;
    if (hint) hint.style.display = 'none';
    const pos = getPos(e, canvas);
    currentPath = [pos];

    if (activeTool === 'highlight') {
      hlStartX = pos.x;
      hlStartY = pos.y;
      // Snapshot the canvas before this stroke so we can restore per-frame
      baseSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    } else {
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      applyStyle(ctx);
    }
  }

  function draw(e, idx) {
    // Two-finger drag scrolls the page manually (the canvas has touch-action:
    // none so the browser won't scroll it for us).
    if (e.touches && e.touches.length > 1) {
      e.preventDefault();
      const y = e.touches[0].clientY;
      const area = document.getElementById('documentArea');
      if (area && twoFingerLastY != null) area.scrollTop -= (y - twoFingerLastY);
      twoFingerLastY = y;
      return;
    }
    if (!isDrawing || idx !== activeIdx) return;
    e.preventDefault();
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx } = state;
    const pos = getPos(e, canvas);
    currentPath.push(pos);

    if (activeTool === 'eraser') {
      const es = penSize * 6;
      ctx.clearRect(pos.x - es/2, pos.y - es/2, es, es);
    } else if (activeTool === 'highlight') {
      // Restore snapshot each frame so segments don't stack
      if (baseSnapshot) ctx.putImageData(baseSnapshot, 0, 0);
      const hs = hlSize * 6;
      const x = Math.min(hlStartX, pos.x);
      const w = Math.abs(pos.x - hlStartX);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.fillStyle = hlColor;
      ctx.fillRect(x, hlStartY - hs / 2, w, hs);
    } else {
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  }

  function endDraw(e, idx) {
    twoFingerLastY = null;   // end any two-finger scroll gesture
    if (!isDrawing || idx !== activeIdx) return;
    isDrawing = false;
    const state = pageStates[idx];
    if (!state) return;
    const { ctx } = state;

    if (activeTool === 'highlight') {
      // Rectangle is already drawn; save as two-point stroke for undo/redraw
      const lastPos = currentPath[currentPath.length - 1] || { x: hlStartX, y: hlStartY };
      if (Math.abs(lastPos.x - hlStartX) > 2) {
        state.strokes.push({
          tool: 'highlight',
          color: hlColor,
          size: hlSize,
          path: [{ x: hlStartX, y: hlStartY }, lastPos]
        });
      }
      baseSnapshot = null;
    } else if (activeTool !== 'eraser') {
      state.strokes.push({
        tool: activeTool,
        color: penColor,
        size: penSize,
        path: [...currentPath]
      });
      ctx.closePath();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }

  function applyStyle(ctx) {
    if (activeTool === 'pen') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = penColor;
      ctx.lineWidth   = penSize;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
    } else if (activeTool === 'highlight') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = hlColor;
      ctx.lineWidth   = hlSize * 6;
      ctx.lineCap     = 'square';
      ctx.lineJoin    = 'round';
    }
  }

  /* ── Tool switching ── */
  // Clicking a tool button toggles it: pick it, or click the active one again
  // to turn it off (no tool = read/scroll the document normally).
  function setTool(tool) {
    activeTool = (activeTool === tool) ? null : tool;
    applyToolUI();
  }

  // Force a tool on (used by the colour/size pickers — choosing a colour means
  // you want that tool active, never off).
  function selectTool(tool) {
    activeTool = tool;
    applyToolUI();
  }

  function applyToolUI() {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === activeTool));
    document.querySelectorAll('.annotation-canvas').forEach(c => c.classList.toggle('eraser-mode', activeTool === 'eraser'));
    // Text mode lets clicks reach the page so text boxes can be placed/edited
    document.body.classList.toggle('tool-text', activeTool === 'text');
    // No tool active → let touches/clicks pass through so the page scrolls.
    document.body.classList.toggle('no-tool', !activeTool);
  }

  function setPenColor(el) {
    penColor = el.dataset.color;
    document.querySelectorAll('#penColors .color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selectTool('pen');
  }

  function setHlColor(el) {
    hlColor = el.dataset.color;
    document.querySelectorAll('#hlColors .color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selectTool('highlight');
  }

  function setPenSize(el) {
    penSize = parseInt(el.dataset.size);
    document.querySelectorAll('#penSizeRow .size-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectTool('pen');
  }

  function setHlSize(el) {
    hlSize = parseInt(el.dataset.size);
    document.querySelectorAll('#hlSizeRow .size-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectTool('highlight');
  }

  /* ── Undo (acts on the most recently active page) ── */
  function undoStroke() {
    const state = pageStates[activeIdx];
    if (!state) return;
    state.strokes.pop();
    redrawPage(activeIdx);
  }

  function redrawPage(idx) {
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx, strokes, hint } = state;
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    strokes.forEach(s => {
      if (!s.path.length) return;
      ctx.beginPath();
      if (s.tool === 'pen') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha  = 1;
        ctx.strokeStyle  = s.color;
        ctx.lineWidth    = s.size;
        ctx.lineCap      = 'round';
        ctx.lineJoin     = 'round';
        ctx.moveTo(s.path[0].x, s.path[0].y);
        s.path.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();
      } else if (s.tool === 'highlight') {
        // Draw as a single filled rectangle — straight line, no opacity stacking
        if (s.path.length < 2) return;
        const hs = s.size * 6;
        const x = Math.min(s.path[0].x, s.path[1].x);
        const w = Math.abs(s.path[1].x - s.path[0].x);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = s.color;
        ctx.fillRect(x, s.path[0].y - hs / 2, w, hs);
      }
      ctx.closePath();
    });
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    if (hint && strokes.length === 0) hint.style.display = '';
  }

  function clearCanvas() {
    pageStates.forEach((state, idx) => {
      state.strokes = [];
      redrawPage(idx);
      if (state.inner) state.inner.querySelectorAll('.text-annotation').forEach(b => b.remove());
    });
    toast('Canvas cleared');
  }

  /* ═══════════════════════════════════════════
     UPLOAD & FILE HANDLING
  ═══════════════════════════════════════════ */
  /* ══════════════════════════════════════════
     MULTI-FILE MANAGER
  ══════════════════════════════════════════ */
  let fileRegistry = [];   // { id, name, type, fileObj, thumb }
  let activeFileId = null;

  async function handleUpload(e) {
    const files = Array.from(e.target.files);
    e.target.value = '';
    if (!files.length) return;
    for (const file of files) await addFileToRegistry(file);
  }

  // Editor uploads are also stored in the user's Library (backend + S3) so
  // they survive reloads and show up on the home page. Uses a direct fetch
  // rather than api-client.js so an expired session can't redirect away
  // mid-editing; logged-out (standalone) use stays session-only.
  async function persistToLibrary(file, entry) {
    const token = localStorage.getItem('advohq_token');
    if (!token) return;
    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch('https://advohq-backend.onrender.com/api/documents', {
        method: 'POST',
        headers: { authorization: 'Bearer ' + token },
        body: fd,
      });
      if (!res.ok) throw new Error('upload failed');
      const doc = await res.json();
      if (entry) entry.docId = doc.id;   // ties the panel entry to the Library
      toast(`Saved "${file.name}" to your Library`);
    } catch (e) {
      toast(`Could not save "${file.name}" to your Library`);
    }
  }

  // Fills the Files panel with the user's Library documents so they survive
  // page refreshes. Bytes are fetched lazily when a file is opened.
  async function loadLibraryIntoPanel(caseId) {
    const token = localStorage.getItem('advohq_token');
    if (!token) return;
    try {
      // Scope the panel to one folder (case) when opened from inside it, so it
      // shows only that folder's files — not the whole account.
      const url = 'https://advohq-backend.onrender.com/api/documents'
        + (caseId ? '?caseId=' + encodeURIComponent(caseId) : '');
      const res = await fetch(url, {
        headers: { authorization: 'Bearer ' + token },
      });
      if (!res.ok) return;
      const docs = await res.json();
      for (const d of docs) {
        if (!['pdf', 'docx', 'image'].includes(d.kind)) continue;   // editor can only render these
        if (fileRegistry.some(f => f.docId === d.id)) continue;
        fileRegistry.push({
          id: 'lib-' + d.id, docId: d.id, name: d.fileName,
          type: d.contentType || '', kind: d.kind, fileObj: null, thumb: null,
        });
      }
      renderFilePanel();
    } catch (e) {
      // Backend unreachable (e.g. waking from idle) — the panel starts
      // empty; a reload once it's awake brings the Library back.
    }
  }

  /** Lazily downloads a Library file's bytes the first time it is opened. */
  async function ensureFileBytes(entry) {
    if (entry.fileObj || !entry.docId) return true;
    const token = localStorage.getItem('advohq_token');
    if (!token) return false;
    try {
      const res = await fetch(`https://advohq-backend.onrender.com/api/documents/${encodeURIComponent(entry.docId)}/content`, {
        headers: { authorization: 'Bearer ' + token },
      });
      if (!res.ok) throw new Error(`content fetch failed (${res.status})`);
      const blob = await res.blob();
      entry.fileObj = new File([blob], entry.name, { type: blob.type || entry.type });
      if (entry.kind === 'image' && !entry.thumb) {
        entry.thumb = URL.createObjectURL(entry.fileObj);
        renderFilePanel();
      }
      return true;
    } catch (e) {
      toast(`Could not load "${entry.name}" from your Library.`);
      return false;
    }
  }

  // `persist: false` is used for files passed in from the home page — those
  // already live in the Library and must not be re-uploaded as duplicates.
  async function addFileToRegistry(file, { persist = true } = {}) {
    const name = file.name || '';
    const isDocx = file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || /\.docx$/i.test(name);
    const isPdf  = file.type === 'application/pdf' || /\.pdf$/i.test(name);
    const isImg  = file.type.startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(name);
    if (!isPdf && !isImg && !isDocx) {
      toast('Unsupported file type. Upload PDF, PNG, or DOCX.'); return;
    }
    const kind = isPdf ? 'pdf' : (isDocx ? 'docx' : 'image');
    const id = Date.now() + Math.random();
    let thumb = null;
    if (isImg) thumb = URL.createObjectURL(file);
    const entry = { id, name, type: file.type, kind, fileObj: file, thumb };
    fileRegistry.push(entry);
    renderFilePanel();
    if (persist) persistToLibrary(file, entry);
    await switchToFile(id);
  }

  async function switchToFile(id) {
    activeFileId = id;
    const entry = fileRegistry.find(f => f.id === id);
    if (!entry) return;
    currentFileName = entry.name;
    document.getElementById('topbarFilename').value = entry.name;
    renderFilePanel();
    const wrap = document.getElementById('docPagesWrap');
    // Library entries carry no bytes until first opened
    if (!(await ensureFileBytes(entry))) {
      if (wrap) wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Could not load "${entry.name}". ${localStorage.getItem('advohq_token') ? 'Please try again.' : 'Please sign in again.'}</p></div>`;
      return;
    }
    pageStates = [];
    docxEditable = null;
    const kind = entry.kind || (entry.type === 'application/pdf' ? 'pdf' : 'image');
    try {
      if (kind === 'pdf') {
        await loadPDF(entry.fileObj, false);
      } else if (kind === 'docx') {
        await loadDocx(entry.fileObj);
      } else {
        await loadImage(entry.fileObj);
      }
    } catch (err) {
      // Never fail silently — surface the reason so the file never just
      // "does nothing" when opened.
      console.error('Failed to open document:', err);
      if (wrap) wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Could not open "${entry.name}".<br><span style="font-size:0.8rem;opacity:0.8;">${(err && err.message ? String(err.message) : 'Unknown error').slice(0, 160)}</span></p></div>`;
    }
  }

  async function removeFile(id) {
    const entry = fileRegistry.find(f => f.id === id);
    // Files stored in the Library are deleted for real (S3 + database) so
    // they stay gone; purely local files just leave the panel.
    if (entry && entry.docId) {
      if (!confirm(`Delete "${entry.name}" from your Library? This cannot be undone.`)) return;
      try {
        const token = localStorage.getItem('advohq_token');
        const res = await fetch(`https://advohq-backend.onrender.com/api/documents/${encodeURIComponent(entry.docId)}`, {
          method: 'DELETE',
          headers: token ? { authorization: 'Bearer ' + token } : {},
        });
        if (!res.ok) throw new Error(`delete failed (${res.status})`);
        toast(`Deleted "${entry.name}" from your Library`);
      } catch (e) {
        toast('Could not delete from your Library. Please try again.');
        return;
      }
    }
    fileRegistry = fileRegistry.filter(f => f.id !== id);
    if (activeFileId === id) {
      if (fileRegistry.length > 0) {
        switchToFile(fileRegistry[fileRegistry.length - 1].id);
      } else {
        activeFileId = null;
        document.getElementById('topbarFilename').value = 'Untitled Document';
        // Restore blank page
        const wrap = document.getElementById('docPagesWrap');
        wrap.innerHTML = `
          <div class="doc-page-container" id="blankPageContainer">
            <div class="doc-page-inner" id="docPage" style="min-height: calc(100vh - 52px - 64px);">
              <canvas id="annotationCanvas" class="annotation-canvas"></canvas>
            </div>
          </div>`;
        initBlankPage();
      }
    }
    renderFilePanel();
  }

  function renderFilePanel() {
    const list = document.getElementById('filePanelList');
    if (!list) return;
    list.innerHTML = '';
    if (fileRegistry.length === 0) {
      list.innerHTML = `<div class="file-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>No files yet.<br>Upload PDF, PNG or DOCX above.</p>
      </div>`;
      return;
    }
    fileRegistry.forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
      item.onclick = () => switchToFile(f.id);
      const ext = f.name.split('.').pop().toUpperCase();
      item.innerHTML = `
        <div class="file-item-thumb">
          ${f.thumb ? `<img src="${f.thumb}" alt="">` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}
        </div>
        <div class="file-item-info">
          <div class="file-item-name" title="${f.name}">${f.name}</div>
          <div class="file-item-meta">${ext}</div>
        </div>
        <button class="file-item-del" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      // Wire the delete via a closure so it works for any id type — Library
      // files have string ids (e.g. "lib-…"), which broke inline onclick.
      item.querySelector('.file-item-del').onclick = (e) => { e.stopPropagation(); removeFile(f.id); };
      list.appendChild(item);
    });
  }

  function setupDropZone() {
    const dz = document.getElementById('fileDropZone');
    if (!dz) return;
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', async e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files);
      for (const file of files) await addFileToRegistry(file);
    });
    dz.addEventListener('click', () => document.getElementById('fileUploadInput').click());
  }

  async function loadPDF(file, append) {
    const wrap = document.getElementById('docPagesWrap');
    if (!append) {
      wrap.innerHTML = `<div class="pdf-loading">
        <div class="pdf-spinner"></div>
        <p>Rendering PDF…</p>
      </div>`;
      pageStates = [];
    }

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      if (!append) wrap.innerHTML = '';
      const totalPages = pdf.numPages;

      // Determine available width for responsive scaling
      const docArea = document.getElementById('documentArea');
      // clientWidth can be 0 if layout hasn't settled yet — clamp so the
      // scale never goes zero/negative (which makes pdf.js throw).
      const availW = Math.min(Math.max(docArea.clientWidth - 48, 320), 820);

      for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const dpr = window.devicePixelRatio || 1;
        // First get viewport at scale 1 to find natural width
        const vpBase = page.getViewport({ scale: 1 });
        const scale = availW / vpBase.width;
        const viewport = page.getViewport({ scale });

        /* Outer container */
        const container = document.createElement('div');
        container.className = 'doc-page-container';

        /* Page label */
        if (totalPages > 1) {
          const lbl = document.createElement('div');
          lbl.className = 'page-label';
          lbl.textContent = `Page ${i} of ${totalPages}`;
          container.appendChild(lbl);
        }

        /* Inner doc page */
        const inner = document.createElement('div');
        inner.className = 'doc-page-inner';
        inner.style.width = viewport.width + 'px';
        inner.style.height = viewport.height + 'px';
        inner.style.maxWidth = '100%';

        /* PDF background canvas */
        const bgCanvas = document.createElement('canvas');
        bgCanvas.className = 'pdf-bg-canvas';
        bgCanvas.width  = viewport.width  * dpr;
        bgCanvas.height = viewport.height * dpr;
        bgCanvas.style.width  = viewport.width  + 'px';
        bgCanvas.style.height = viewport.height + 'px';

        const bgCtx = bgCanvas.getContext('2d');
        bgCtx.scale(dpr, dpr);
        await page.render({ canvasContext: bgCtx, viewport }).promise;

        /* Annotation canvas */
        const annoCanvas = document.createElement('canvas');
        annoCanvas.className = 'annotation-canvas';
        annoCanvas.width  = viewport.width  * dpr;
        annoCanvas.height = viewport.height * dpr;
        annoCanvas.style.width  = viewport.width  + 'px';
        annoCanvas.style.height = viewport.height + 'px';
        const annoCtx = annoCanvas.getContext('2d');
        annoCtx.scale(dpr, dpr);
        if (activeTool === 'eraser') annoCanvas.classList.add('eraser-mode');

        inner.appendChild(bgCanvas);
        inner.appendChild(annoCanvas);
        container.appendChild(inner);
        wrap.appendChild(container);

        /* Editable text layer (extracted PDF text — edit with the Text tool).
           Built after the page is in the DOM so run widths can be measured. */
        await buildPdfTextLayer(inner, page, viewport, bgCtx, dpr);

        const idx = pageStates.length;
        pageStates.push({ canvas: annoCanvas, ctx: annoCtx, strokes: [], hint: null, inner });
        attachCanvasEvents(annoCanvas, idx);
        attachTextLayer(inner, idx);
      }

      toast(`PDF loaded — use the Text tool to edit text`);
    } catch (err) {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to load PDF. Please try again.</p></div>`;
      console.error(err);
    }
  }

  /* Build an editable text layer over a rendered PDF page. */
  async function buildPdfTextLayer(inner, page, viewport, bgCtx, dpr) {
    // Sample the page background so edited runs can mask the original text
    let pageBg = '#ffffff';
    try {
      const s = Math.max(1, Math.floor(2 * dpr));
      const d = bgCtx.getImageData(s, s, 1, 1).data;
      if (d[3] > 0) pageBg = `rgb(${d[0]},${d[1]},${d[2]})`;
    } catch (e) {}
    inner.style.setProperty('--pdf-page-bg', pageBg);

    let textContent;
    try { textContent = await page.getTextContent(); }
    catch (e) { return; }

    const layer = document.createElement('div');
    layer.className = 'pdf-text-layer';
    layer.style.width  = viewport.width  + 'px';
    layer.style.height = viewport.height + 'px';

    const spans = [];
    textContent.items.forEach(item => {
      if (!item.str || !item.str.trim()) return;
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const fontHeight = Math.hypot(tx[2], tx[3]);
      if (!fontHeight) return;
      const span = document.createElement('span');
      span.className = 'pdf-text-item';
      span.textContent = item.str;
      // NOT editable: the PDF's own text is stored as many separately
      // positioned fragments, and editing them in place reorders/garbles the
      // surrounding text. This layer is kept transparent for text extraction
      // (search, AI, save) only; use the Text tool to add a text box on top.
      span.style.left = tx[4] + 'px';
      // tx[5] is the text baseline; offset up by the typical ascent (~0.8em)
      // so the HTML baseline lands on the PDF baseline and the mask covers the run.
      span.style.top  = (tx[5] - fontHeight * 0.8) + 'px';
      span.style.fontSize = fontHeight + 'px';
      span.dataset.w = (item.width * (viewport.scale || 1)) || 0; // target device width
      layer.appendChild(span);
      spans.push(span);
    });
    inner.appendChild(layer);

    // Stretch each run horizontally to match the original width so the
    // opaque mask lines up when editing (the substitute font differs).
    spans.forEach(span => {
      const target = parseFloat(span.dataset.w);
      if (!target) return;
      const measured = span.getBoundingClientRect().width;
      if (measured > 0) span.style.transform = `scaleX(${target / measured})`;
    });
  }

  async function loadImage(file) {
    const wrap = document.getElementById('docPagesWrap');
    wrap.innerHTML = `<div class="pdf-loading"><div class="pdf-spinner"></div><p>Loading image…</p></div>`;
    pageStates = [];

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const dpr = window.devicePixelRatio || 1;
      const maxW = Math.min(img.naturalWidth, 820);
      const scale = maxW / img.naturalWidth;
      const w = maxW, h = img.naturalHeight * scale;

      wrap.innerHTML = '';

      const container = document.createElement('div');
      container.className = 'doc-page-container';

      const inner = document.createElement('div');
      inner.className = 'doc-page-inner';
      inner.style.width  = w + 'px';
      inner.style.height = h + 'px';

      /* Image background */
      const imgEl = document.createElement('img');
      imgEl.src = url;
      imgEl.className = 'doc-image-preview';
      imgEl.style.width = '100%';
      imgEl.style.height = h + 'px';
      imgEl.style.objectFit = 'contain';
      imgEl.draggable = false;

      /* Annotation canvas */
      const annoCanvas = document.createElement('canvas');
      annoCanvas.className = 'annotation-canvas';
      annoCanvas.width  = w * dpr;
      annoCanvas.height = h * dpr;
      annoCanvas.style.width  = w + 'px';
      annoCanvas.style.height = h + 'px';
      const annoCtx = annoCanvas.getContext('2d');
      annoCtx.scale(dpr, dpr);
      if (activeTool === 'eraser') annoCanvas.classList.add('eraser-mode');

      inner.appendChild(imgEl);
      inner.appendChild(annoCanvas);
      container.appendChild(inner);
      wrap.appendChild(container);

      pageStates.push({ canvas: annoCanvas, ctx: annoCtx, strokes: [], hint: null, inner });
      attachCanvasEvents(annoCanvas, 0);
      attachTextLayer(inner, 0);
      toast('Image loaded');
    };
    img.onerror = () => {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to load image.</p></div>`;
    };
    img.src = url;
  }

  /* ═══════════════════════════════════════════
     DOCX — convert to editable rich text (Mammoth)
  ═══════════════════════════════════════════ */
  async function loadDocx(file) {
    const wrap = document.getElementById('docPagesWrap');
    wrap.innerHTML = `<div class="pdf-loading"><div class="pdf-spinner"></div><p>Loading document…</p></div>`;
    pageStates = [];
    docxEditable = null;

    if (typeof mammoth === 'undefined') {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Word support failed to load. Check your connection and retry.</p></div>`;
      return;
    }

    try {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer });
      wrap.innerHTML = '';
      wrap.appendChild(buildDocxToolbar());

      const container = document.createElement('div');
      container.className = 'doc-page-container';

      const inner = document.createElement('div');
      inner.className = 'doc-page-inner docx-page';

      const editable = document.createElement('div');
      editable.className = 'docx-content';
      editable.contentEditable = 'true';
      editable.spellcheck = true;
      editable.innerHTML = result.value && result.value.trim() ? result.value : '<p><br></p>';

      inner.appendChild(editable);
      container.appendChild(inner);
      wrap.appendChild(container);

      docxEditable = editable;
      toast('Document loaded — click to edit text');
    } catch (err) {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to open this Word document.</p></div>`;
      console.error(err);
    }
  }

  function docCmd(cmd, val) {
    if (!docxEditable) return;
    docxEditable.focus();
    document.execCommand(cmd, false, val || null);
  }

  /* ── Save: write the edits back to the document in your Library (AWS) ── */
  async function saveDocument() {
    const entry = fileRegistry.find(f => f.id === activeFileId);
    if (!entry) { toast('Open a document first, then save.'); return; }
    if (!localStorage.getItem('advohq_token')) {
      toast('Sign in to save changes to your Library.'); return;
    }

    const saveBtn = document.querySelector('.save-btn');
    if (saveBtn) saveBtn.disabled = true;
    toast('Saving…');
    try {
      const built = await buildEditedFile(entry);
      if (!built) { toast('Nothing to save for this file type.'); return; }
      await uploadEditedFile(entry, built.blob, built.fileName);
      toast('Saved to your Library');
    } catch (e) {
      console.error('Save failed:', e);
      toast('Could not save. Please try again.');
    } finally {
      if (saveBtn) saveBtn.disabled = false;
    }
  }

  // Produces the edited bytes for the active file: an updated .docx for Word
  // documents, or a flattened PDF/PNG carrying the annotations for the others.
  async function buildEditedFile(entry) {
    if (docxEditable) {
      const blob = await htmlToDocxBlob(docxEditable);
      return { blob, fileName: entry.name };
    }

    const inners = [...document.querySelectorAll('#docPagesWrap .doc-page-inner')];
    if (!inners.length || typeof html2canvas === 'undefined') return null;

    // Image: flatten the single page (background + annotations) to a PNG.
    if (entry.kind === 'image') {
      const shot = await html2canvas(inners[0], { backgroundColor: '#ffffff', scale: 1.5, useCORS: true, logging: false });
      const blob = await new Promise(res => shot.toBlob(res, 'image/png'));
      return { blob, fileName: entry.name };
    }

    // PDF: keep the ORIGINAL pages (full quality) and overlay only the user's
    // markup — pen/highlighter strokes plus any added/edited text — as a
    // transparent layer. Much faster and smaller than rasterising every full
    // page (which also blew past the browser's max canvas size on big docs).
    if (!entry.fileObj) return null;
    const pdfDoc = await PDFLib.PDFDocument.load(await entry.fileObj.arrayBuffer(), { ignoreEncryption: true });
    const pdfPages = pdfDoc.getPages();

    for (let i = 0; i < inners.length && i < pdfPages.length; i++) {
      const inner = inners[i];
      const state = pageStates[i];
      const hasStrokes = state && state.strokes && state.strokes.length > 0;
      const hasTextBox = !!inner.querySelector('.text-annotation');
      // NOTE: edits to the PDF's *own* extracted text (.pdf-text-item.edited)
      // are intentionally NOT flattened. Painting them over the original text
      // (which stays in the PDF) doubled and garbled the content. We only add
      // markup on top; the document's original text is never touched.
      if (!hasStrokes && !hasTextBox) continue;   // nothing to overlay — leave the page as-is

      let pngBytes;
      if (hasTextBox) {
        // Added text boxes are HTML, so rasterise them with html2canvas. Hide
        // the PDF background AND its extracted text layer first, so the shot
        // captures ONLY the user's markup (strokes + text boxes) — never the
        // document's own text. The real page comes from the original PDF.
        const toHide = [...inner.querySelectorAll('.pdf-bg-canvas, .pdf-text-layer')];
        const prev = toHide.map(el => el.style.visibility);
        toHide.forEach(el => { el.style.visibility = 'hidden'; });
        // The text box's dashed editing border/handles are UI only — strip them
        // so they don't get baked into the saved document.
        const boxes = [...inner.querySelectorAll('.text-annotation')];
        const prevBorder = boxes.map(b => b.style.borderColor);
        boxes.forEach(b => { b.style.borderColor = 'transparent'; });
        let shot;
        try {
          shot = await html2canvas(inner, { backgroundColor: null, scale: 1.5, useCORS: true, logging: false, ignoreElements: (el) => el.classList && (el.classList.contains('ta-handle') || el.classList.contains('ta-del')) });
        } finally {
          toHide.forEach((el, k) => { el.style.visibility = prev[k] || ''; });
          boxes.forEach((b, k) => { b.style.borderColor = prevBorder[k] || ''; });
        }
        pngBytes = await new Promise(res => shot.toBlob(b => b ? b.arrayBuffer().then(res) : res(null), 'image/png'));
      } else {
        // Pen/highlighter only — the annotation canvas is already a transparent
        // bitmap, so use it directly (no html2canvas = near-instant).
        pngBytes = await new Promise(res => state.canvas.toBlob(b => b ? b.arrayBuffer().then(res) : res(null), 'image/png'));
      }
      if (!pngBytes) continue;
      const png = await pdfDoc.embedPng(pngBytes);
      const p = pdfPages[i];
      const { width, height } = p.getSize();
      p.drawImage(png, { x: 0, y: 0, width, height });
    }

    const bytes = await pdfDoc.save();
    return { blob: new Blob([bytes], { type: 'application/pdf' }), fileName: entry.name };
  }

  // Converts the editor's contenteditable HTML into a real WordprocessingML
  // .docx (via the docx library) so it reopens correctly with mammoth.
  // Preserves headings, bold/italic/underline, lists, and tables.
  async function htmlToDocxBlob(rootEl) {
    const D = docx;
    const runsFrom = (node, fmt) => {
      fmt = fmt || {}; const out = [];
      node.childNodes.forEach(ch => {
        if (ch.nodeType === 3) {
          if (ch.textContent) out.push(new D.TextRun({ text: ch.textContent, bold: !!fmt.bold, italics: !!fmt.italics, underline: fmt.underline ? {} : undefined }));
        } else if (ch.nodeType === 1) {
          const t = ch.tagName.toLowerCase(); const nf = Object.assign({}, fmt);
          if (t === 'b' || t === 'strong') nf.bold = true;
          if (t === 'i' || t === 'em') nf.italics = true;
          if (t === 'u') nf.underline = true;
          if (t === 'br') { out.push(new D.TextRun({ break: 1 })); return; }
          runsFrom(ch, nf).forEach(r => out.push(r));
        }
      });
      return out.length ? out : [new D.TextRun('')];
    };
    const paraFor = (el, opts) => new D.Paragraph(Object.assign({ children: runsFrom(el) }, opts || {}));
    const tableFrom = (tableEl) => {
      const rows = [];
      tableEl.querySelectorAll('tr').forEach(tr => {
        const cells = [];
        tr.querySelectorAll('td,th').forEach(td => {
          const inner = blocksFrom(td);
          cells.push(new D.TableCell({ children: inner.length ? inner : [new D.Paragraph({ children: [new D.TextRun('')] })] }));
        });
        if (cells.length) rows.push(new D.TableRow({ children: cells }));
      });
      return new D.Table({ rows, width: { size: 100, type: D.WidthType.PERCENTAGE } });
    };
    function blocksFrom(el) {
      const blocks = [];
      Array.from(el.childNodes).forEach(node => {
        if (node.nodeType === 3 && node.textContent.trim()) { blocks.push(new D.Paragraph({ children: [new D.TextRun(node.textContent)] })); return; }
        if (node.nodeType !== 1) return;
        const t = node.tagName.toLowerCase();
        if (t === 'h1') blocks.push(paraFor(node, { heading: D.HeadingLevel.HEADING_1 }));
        else if (t === 'h2') blocks.push(paraFor(node, { heading: D.HeadingLevel.HEADING_2 }));
        else if (t === 'h3') blocks.push(paraFor(node, { heading: D.HeadingLevel.HEADING_3 }));
        else if (t === 'ul' || t === 'ol') node.querySelectorAll(':scope > li').forEach(li => blocks.push(paraFor(li, { bullet: { level: 0 } })));
        else if (t === 'table') blocks.push(tableFrom(node));
        else if (t === 'div') blocksFrom(node).forEach(b => blocks.push(b));
        else blocks.push(paraFor(node));
      });
      return blocks;
    }
    const blocks = blocksFrom(rootEl);
    const doc = new D.Document({ sections: [{ children: blocks.length ? blocks : [new D.Paragraph({ children: [] })] }] });
    return await D.Packer.toBlob(doc);
  }

  // Updates the existing Library document in place, or creates one if this
  // file isn't in the Library yet (e.g. just dragged in).
  async function uploadEditedFile(entry, blob, fileName) {
    const token = localStorage.getItem('advohq_token');
    const fd = new FormData();
    fd.append('file', new File([blob], fileName, { type: blob.type }));
    const base = 'https://advohq-backend.onrender.com/api/documents';
    const url = entry.docId ? `${base}/${encodeURIComponent(entry.docId)}/content` : base;
    const res = await fetch(url, {
      method: entry.docId ? 'PUT' : 'POST',
      headers: { authorization: 'Bearer ' + token },
      body: fd,
    });
    if (!res.ok) throw new Error(`save failed (${res.status})`);
    const doc = await res.json();
    entry.docId = doc.id;                    // capture id for first-time saves
    entry.fileObj = new File([blob], fileName, { type: blob.type }); // refetch not needed
  }

  /* ── Move the tools toolbar up into the topbar ── */
  (function relocateToolsIntoTopbar() {
    const tools = document.querySelector('.tools-panel');
    const topbar = document.querySelector('.topbar');
    const right = document.querySelector('.topbar-right');
    if (tools && topbar && right) topbar.insertBefore(tools, right);

  /* ── Init blank page on load ── */
  initBlankPage();
  renderFilePanel();
  setupDropZone();
  applyToolUI();   // start with no tool selected (page is readable/scrollable)

  /* ── Auto-load the Library + file(s) passed from home page ── */
  (async () => {
    // Always list the user's Library in the Files panel so documents survive
    // page refreshes. When opened from a folder (?case=<id>), show only that
    // folder's files; otherwise the whole Library. Bytes load lazily on open.
    const params = new URLSearchParams(window.location.search);
    const caseParam = params.get('case');
    await loadLibraryIntoPanel(caseParam);

    // Library file passed by id (?doc=<id>): activate that entry.
    const docParam = params.get('doc');
    if (docParam) {
      const entry = fileRegistry.find(f => f.docId === docParam);
      if (entry) {
        await switchToFile(entry.id);
      } else {
        toast('Could not find that document in your Library.');
      }
      return; // ?doc= takes priority over any stale localStorage handoff
    }

    // New multi-file key takes priority
    const rawMulti = localStorage.getItem('advohq_open_files');
    const rawSingle = localStorage.getItem('advohq_open_file');

    if (rawMulti) {
      localStorage.removeItem('advohq_open_files');
      localStorage.removeItem('advohq_open_file');
      try {
        const entries = JSON.parse(rawMulti);
        // Load all files; switch to the active one last so it ends up displayed
        const activeEntry = entries.find(e => e.active) || entries[0];
        const others = entries.filter(e => !e.active);

        // Load non-active files silently first
        for (const entry of others) {
          const res = await fetch(entry.dataUrl);
          const blob = await res.blob();
          const file = new File([blob], entry.name, { type: entry.mimeType });
          await addFileToRegistry(file, { persist: false });
        }
        // Load active file last so it becomes the displayed one
        if (activeEntry) {
          const res = await fetch(activeEntry.dataUrl);
          const blob = await res.blob();
          const file = new File([blob], activeEntry.name, { type: activeEntry.mimeType });
          await addFileToRegistry(file, { persist: false });
        }
      } catch(e) {
        console.error('Failed to load files from library:', e);
      }
    } else if (rawSingle) {
      localStorage.removeItem('advohq_open_file');
      try {
        const { name, mimeType, dataUrl } = JSON.parse(rawSingle);
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        const file = new File([blob], name, { type: mimeType });
        await addFileToRegistry(file, { persist: false });
      } catch(e) {
        console.error('Failed to load file from library:', e);
      }
    }
  })();

  /* ── Print: this document, or every document in every format ── */
  function togglePrintMenu(e) {
    if (e) e.stopPropagation();
    const menu = document.getElementById('printMenu');
    const allBtn = document.getElementById('printAllBtn');
    if (allBtn) allBtn.textContent = `Print all documents (${fileRegistry.length})`;
    menu.classList.toggle('open');
  }
  function closePrintMenu() {
    const menu = document.getElementById('printMenu');
    if (menu) menu.classList.remove('open');
  }
  document.addEventListener('click', closePrintMenu);

  function printThisDoc() {
    closePrintMenu();
    document.body.classList.remove('printing-all');
    window.print();
  }

  // Render helpers for the all-documents print layer — every page, every format.
  async function renderPdfForPrint(fileObj, container) {
    const pdf = await pdfjsLib.getDocument({ data: await fileObj.arrayBuffer() }).promise;
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 1.5 });
      const c = document.createElement('canvas');
      c.className = 'print-page'; c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      container.appendChild(c);
    }
  }
  async function renderDocxForPrint(fileObj, container) {
    const res = await mammoth.convertToHtml({ arrayBuffer: await fileObj.arrayBuffer() });
    const div = document.createElement('div');
    div.className = 'print-docx';
    div.innerHTML = res.value || '<p></p>';
    container.appendChild(div);
  }
  function renderImageForPrint(fileObj, container) {
    const img = document.createElement('img');
    img.className = 'print-page';
    img.src = URL.createObjectURL(fileObj);
    container.appendChild(img);
  }

  async function printAllDocs() {
    closePrintMenu();
    if (!fileRegistry.length) { toast('No documents to print.'); return; }
    const btn = document.getElementById('printAllBtn');
    if (btn) btn.disabled = true;
    toast('Preparing all documents for print…');
    document.getElementById('printAllContainer')?.remove();
    const container = document.createElement('div');
    container.id = 'printAllContainer';
    document.body.appendChild(container);
    try {
      for (const entry of fileRegistry) {
        if (!(await ensureFileBytes(entry))) continue;
        if (entry.kind === 'pdf') await renderPdfForPrint(entry.fileObj, container);
        else if (entry.kind === 'docx') await renderDocxForPrint(entry.fileObj, container);
        else await renderImageForPrint(entry.fileObj, container);
      }
      if (!container.childElementCount) { toast('Nothing could be prepared for print.'); container.remove(); return; }
      const cleanup = () => {
        document.body.classList.remove('printing-all');
        container.remove();
        window.removeEventListener('afterprint', cleanup);
      };
      window.addEventListener('afterprint', cleanup);
      document.body.classList.add('printing-all');
      window.print();
      setTimeout(cleanup, 120000);   // fallback if afterprint never fires
    } catch (e) {
      console.error('Print all failed:', e);
      toast('Could not prepare all documents for print.');
      container.remove();
      document.body.classList.remove('printing-all');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  /* ── Advo AI chat ── */
  let aiHistory = [];   // {role:'user'|'assistant', content:string} sent to the model

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // Render the model's plain-text/markdown-ish reply as safe HTML.
  function formatReply(text) {
    let safe = escapeHtml(text).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    const lines = safe.split('\n');
    let html = '', inList = false;
    for (const line of lines) {
      const m = line.match(/^\s*[-•]\s+(.*)$/);
      if (m) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + m[1] + '</li>';
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += line.trim() === '' ? '<br>' : line + '<br>';
      }
    }
    if (inList) html += '</ul>';
    return html;
  }

  function currentDocName() {
    const el = document.getElementById('topbarFilename');
    const n = el ? el.value.trim() : '';
    return (n && n.toLowerCase() !== 'untitled document') ? n : '';
  }

  // The live text of the open document, so Advo AI can actually read it.
  // DOCX → the editable content; PDF → the extracted text runs (includes any
  // edits made with the Text tool); images have no text.
  function currentDocText() {
    if (docxEditable) return (docxEditable.innerText || '').replace(/\n{3,}/g, '\n\n').trim();
    const wrap = document.getElementById('docPagesWrap');
    if (!wrap) return '';
    const pages = wrap.querySelectorAll('.doc-page-inner');
    const parts = [];
    pages.forEach(pageEl => {
      const items = pageEl.querySelectorAll('.pdf-text-item');
      if (items.length) parts.push(Array.from(items).map(s => s.textContent).join(' '));
    });
    return parts.join('\n\n').replace(/[ \t]{2,}/g, ' ').trim();
  }

  function aiScroll() {
    const body = document.getElementById('aiBody');
    if (body) body.scrollTop = body.scrollHeight;
  }

  function addUserMsg(text) {
    const chat = document.getElementById('aiChat');
    const el = document.createElement('div');
    el.className = 'ai-msg user';
    el.textContent = text;
    chat.appendChild(el);
    aiScroll();
  }

  function addBotMsg(html) {
    const chat = document.getElementById('aiChat');
    const el = document.createElement('div');
    el.className = 'ai-msg bot';
    el.innerHTML = `<div class="ai-response-label">Advo AI</div>${html}`;
    chat.appendChild(el);
    aiScroll();
  }

  function showTyping() {
    const chat = document.getElementById('aiChat');
    const t = document.createElement('div');
    t.className = 'ai-typing';
    t.id = 'aiTyping';
    t.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chat.appendChild(t);
    aiScroll();
  }
  function hideTyping() {
    const t = document.getElementById('aiTyping');
    if (t) t.remove();
  }

  // Local, demo response engine — keyword based and document-aware.
  function advoReply(q) {
    const text = q.toLowerCase();
    const doc  = currentDocName();
    const ref  = doc ? `<strong>${escapeHtml(doc)}</strong>` : 'the current document';
    const noDoc = doc ? '' : '<br><br><em>Tip: open or upload a file from the Files panel and I can work directly on it.</em>';

    if (/^(hi|hello|hey|namaste|good (morning|afternoon|evening))\b/.test(text))
      return `Hello! I'm <strong>Advo AI</strong>, your legal assistant. I can summarise documents, pull out key clauses, list action items, draft replies, and answer questions about ${ref}. What would you like to do?`;

    if (/(thank|thanks|cheers)/.test(text))
      return `You're welcome! Let me know if you'd like me to look at anything else in ${ref}.`;

    if (/(summar|tl;?dr|overview|gist)/.test(text))
      return `Here's a summary of ${ref}:<ul><li><strong>Parties & purpose</strong> — who is involved and the core subject matter.</li><li><strong>Key obligations</strong> — the main commitments each side makes.</li><li><strong>Term & termination</strong> — duration and how it can end.</li><li><strong>Risk areas</strong> — clauses worth a closer read.</li></ul>${noDoc}`;

    if (/(clause|provision|term|section)/.test(text))
      return `Scanning ${ref} for notable clauses:<ul><li><strong>Liability & indemnity</strong></li><li><strong>Confidentiality</strong></li><li><strong>Governing law & jurisdiction</strong></li><li><strong>Termination & notice period</strong></li></ul>Want me to explain any of these in plain language?${noDoc}`;

    if (/(action item|to-?do|task|next step|follow.?up)/.test(text))
      return `Action items from ${ref}:<ul><li>Confirm key dates and deadlines.</li><li>Verify party names and signatures.</li><li>Flag any clauses needing negotiation.</li><li>Diarise the next hearing / renewal date.</li></ul>${noDoc}`;

    if (/(draft|respond|response|reply|letter|notice|reply to)/.test(text))
      return `Here's a starting draft you can refine:<br><br><em>"Dear [Counterparty],<br>Thank you for sharing the document. Having reviewed it, we would like to discuss the following points before proceeding…"</em><br><br>Tell me the tone (formal, firm, conciliatory) and the key points, and I'll tailor it.${noDoc}`;

    if (/(deadline|date|hearing|limitation|due)/.test(text))
      return `I'll watch for dates in ${ref}. Any hearing or filing dates I spot can be pushed to your <strong>Schedule</strong> page so you get reminders. ${noDoc}`;

    if (/(risk|issue|problem|concern|red flag)/.test(text))
      return `Potential risk areas to review in ${ref}: ambiguous obligations, one-sided indemnities, auto-renewal terms, and unclear termination triggers. Want a deeper look at any of these?${noDoc}`;

    return `Got it — you asked: <em>"${escapeHtml(q)}"</em>.<br><br>I can summarise ${ref}, extract key clauses, list action items, draft a response, or track important dates. Which would help most?${noDoc}`;
  }

  async function askAI(question) {
    if (!aiOpen) toggleAI();
    const q = String(question || '').trim();
    if (!q) return;
    addUserMsg(q);
    aiHistory.push({ role: 'user', content: q });
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          messages: aiHistory,
          document: currentDocName(),
          documentText: currentDocText().slice(0, 120000),
        }),
      });
      const data = await res.json().catch(() => ({}));
      hideTyping();
      if (res.ok && data.reply) {
        aiHistory.push({ role: 'assistant', content: data.reply });
        addBotMsg(formatReply(data.reply));
      } else if (res.status === 429) {
        // Rate limit hit — tell the user clearly rather than answering.
        aiHistory.pop(); // don't keep the unanswered turn in history
        const mins = data.retryAfter ? Math.ceil(data.retryAfter / 60) : null;
        addBotMsg(
          "You've reached the Advo AI usage limit for now." +
          (mins ? ` Please try again in about ${mins} minute${mins === 1 ? '' : 's'}.` : ' Please try again later.')
        );
      } else {
        // Backend unavailable (e.g. ANTHROPIC_API_KEY not set, or offline) —
        // fall back to the built-in demo responses so the chat still works.
        addBotMsg(advoReply(q));
      }
    } catch (e) {
      hideTyping();
      addBotMsg(advoReply(q));
    }
  }

  function sendAiMessage() {
    const input = document.getElementById('aiInput');
    const q = input.value.trim();
    if (!q) return;
    input.value = ''; input.style.height = 'auto';
    askAI(q);
  }

  function autoGrowAi(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleAiKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAiMessage(); }
  }

  /* ── Notes panel ── */
  let notesOpen = false;
  let notes = [];

  function toggleNotes() {
    notesOpen = !notesOpen;
    document.getElementById('notesPanel').classList.toggle('open', notesOpen);
    document.getElementById('notesToggleBtn').classList.toggle('active', notesOpen);
    document.body.classList.toggle('notes-open', notesOpen);
  }

  function updateNoteBtn() {
    const val = document.getElementById('notesTextarea').value.trim();
    document.getElementById('noteAddBtn').disabled = !val;
  }

  function handleNoteKey(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); addNote(); }
  }

  function addNote() {
    const ta = document.getElementById('notesTextarea');
    const text = ta.value.trim();
    if (!text) return;
    const note = { id: Date.now(), text, time: new Date() };
    notes.unshift(note);
    ta.value = '';
    ta.style.height = 'auto';
    document.getElementById('noteAddBtn').disabled = true;
    renderNotes();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    renderNotes();
  }

  function renderNotes() {
    const list = document.getElementById('notesList');
    const empty = document.getElementById('noteEmpty');
    const count = document.getElementById('notesCount');
    count.textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');

    // Remove old cards
    list.querySelectorAll('.note-card').forEach(c => c.remove());

    if (notes.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    notes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-meta">
          <span>${formatTime(n.time)}</span>
          <button class="note-delete" onclick="deleteNote(${n.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            Delete
          </button>
        </div>`;
      list.appendChild(card);
    });
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' · ' +
           d.toLocaleDateString([], { day: 'numeric', month: 'short' });
  }

  renderNotes();
  function toast(msg) {
    const el = document.getElementById('toastEl');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── NOTIFICATIONS ──
  const NOTIF_READ_KEY = 'advohq_notif_read';

  async function renderNotifPanel() {
    const list = document.getElementById('notifList');
    if (!list) return;
    list.innerHTML = '<div class="notif-empty" style="padding:24px;text-align:center;color:var(--muted);font-size:0.82rem;">Loading…</div>';

    try {
      const { notifications, unread_count } = await API.getNotifications();
      updateBadge(unread_count);

      if (!notifications || notifications.length === 0) {
        list.innerHTML = `<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;stroke:var(--cream-3);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>You\'re all caught up!</div>`;
        return;
      }

      const iconMap = {
        day_of:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
        reminder_1d: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      };
      const typeClass = { day_of: 'deadline', reminder_1d: 'hearing' };

      list.innerHTML = notifications.map(n => {
        const unread = !n.is_read;
        const icon   = iconMap[n.type] || iconMap.reminder_1d;
        const cls    = typeClass[n.type] || 'reminder';
        const time   = n.type === 'day_of' ? 'Today' : 'Tomorrow';
        return `<div class="notif-item${unread ? ' unread' : ''}" onclick="readNotif(${n.id})">
          <div class="notif-dot"></div>
          <div class="notif-icon ${cls}">${icon}</div>
          <div class="notif-body">
            <div class="notif-body-title">${n.title}</div>
            <div class="notif-body-text">${n.body || ''}</div>
          </div>
          <div class="notif-time">${time}</div>
        </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = '<div class="notif-empty" style="padding:24px;text-align:center;color:var(--muted);font-size:0.82rem;">Could not load notifications.</div>';
    }
  }

  function updateBadge(count) {
    const badge = document.getElementById('notifBadge');
    if (!badge) return;
    badge.textContent = count > 9 ? '9+' : count;
    badge.classList.toggle('show', count > 0);
  }

  async function readNotif(id) {
    try { await API.markNotificationRead(id); } catch(e) {}
    renderNotifPanel();
  }

  async function markAllRead() {
    try { await API.markAllNotificationsRead(); } catch(e) {}
    renderNotifPanel();
  }

  let notifOpen = false;
  function toggleNotifPanel(e) {
    if (e) e.stopPropagation();
    notifOpen = !notifOpen;
    const panel = document.getElementById('notifPanel');
    if (!panel) return;
    if (notifOpen) {
      const btn = document.getElementById('notifBtn');
      if (btn) {
        const r = btn.getBoundingClientRect();
        const vh = window.innerHeight || document.documentElement.clientHeight || 800;
        const top = Math.min(r.top, vh - 460);
        panel.style.top = Math.max(16, top) + 'px';
      }
      renderNotifPanel(); panel.classList.add('open');
    }
    else { panel.classList.remove('open'); }
  }

  // Close panel on outside click (ignore clicks on the bell itself)
  document.addEventListener('click', function(e) {
    if (!notifOpen) return;
    const panel = document.getElementById('notifPanel');
    const btn   = document.getElementById('notifBtn');
    if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
      notifOpen = false; panel.classList.remove('open');
    }
  });

  // Poll badge count every 60s
  async function pollNotifCount() {
    try {
      const { unread_count } = await API.getNotificationCount();
      updateBadge(unread_count);
    } catch(e) {}
  }

  // Init badge + start polling
  pollNotifCount();
  setInterval(pollNotifCount, 60000);
</script>
<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span class="notif-panel-title">Notifications</span>
    <button class="notif-mark-read" onclick="markAllRead()">Mark all as read</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

</body>
</html>
